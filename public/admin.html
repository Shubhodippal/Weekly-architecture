<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

  <!-- Top bar -->
  <nav class="topbar">
    <a href="/admin.html" class="topbar__logo">� Challenge Accepted</a>
    <div class="topbar__right">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <span class="topbar__user" style="font-size:13px;">
        <strong id="topbar-name">…</strong>
        <span class="badge badge-admin" style="margin-left:6px;">Admin</span>
      </span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </nav>

  <!-- Skeleton while loading -->
  <div id="skeleton" class="container">
    <div style="background:#e2e8f0;height:80px;border-radius:10px;margin-bottom:16px;animation:pulse 1.4s infinite alternate;"></div>
    <div style="background:#e2e8f0;height:300px;border-radius:10px;animation:pulse 1.4s infinite alternate;"></div>
    <style>@keyframes pulse{from{opacity:.6}to{opacity:1}}</style>
  </div>

  <!-- Main content (shown after auth check) -->
  <div id="content" style="display:none;">
    <div class="container">

      <!-- Page header -->
      <div class="section-header" style="margin-bottom:24px;">
        <div>
          <div class="section-title">User Management</div>
          <div class="section-sub">View and manage all registered users</div>
        </div>
        <a href="/dashboard.html" class="btn btn-primary">📤 Post Challenge</a>
      </div>

      <div id="auto-post-alert" class="alert" style="display:none;margin-bottom:16px;"></div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__value" id="stat-total">—</div>
          <div class="stat-card__label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value" id="stat-admins" style="color:#6d28d9;">—</div>
          <div class="stat-card__label">Admins</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value" id="stat-users" style="color:#1d4ed8;">—</div>
          <div class="stat-card__label">Regular Users</div>
        </div>
      </div>

      <!-- Search and table -->
      <div class="section-header" style="margin-bottom:12px;">
        <div class="section-title" style="font-size:16px;">All Users</div>
        <input
          id="search"
          type="search"
          class="form-input"
          placeholder="Search by name, email or role…"
          style="max-width:280px;"
        />
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Points</th>
              <th>Last Login</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="7" style="text-align:center;color:#6b7280;padding:40px;">
                <span class="spinner"></span> Loading…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Adjust Points Modal -->
  <div id="adj-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.18);">
      <h3 style="margin:0 0 6px;font-size:18px;">✏️ Adjust Points</h3>
      <p id="adj-user-label" style="font-size:13px;color:#6b7280;margin:0 0 20px;"></p>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Points to add / deduct</label>
      <input id="adj-points" type="number" placeholder="e.g. 50 or -20" style="width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Reason (optional)</label>
      <input id="adj-reason" type="text" placeholder="e.g. Bonus for participation" style="width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:20px;">
      <div style="display:flex;gap:10px;">
        <button id="adj-confirm-btn" class="btn btn-primary" style="flex:1;" onclick="confirmAdjustPoints()">Apply</button>
        <button class="btn btn-ghost" style="flex:1;" onclick="closeAdjModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/admin.js"></script>
</body>
</html>
